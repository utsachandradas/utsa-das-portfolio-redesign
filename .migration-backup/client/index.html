<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Utsa Das | SEO & GEO Strategist</title>
    <meta name="description" content="Utsa Das is a professional SEO and GEO strategist helping businesses optimize for both traditional search engines and modern AI systems like ChatGPT and Perplexity." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics script - only loaded if environment variables are set -->
    <script>
      if (typeof import.meta !== 'undefined' && import.meta.env.VITE_ANALYTICS_ENDPOINT) {
        const script = document.createElement('script');
        script.defer = true;
        script.src = import.meta.env.VITE_ANALYTICS_ENDPOINT + '/umami';
        script.dataset.websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
