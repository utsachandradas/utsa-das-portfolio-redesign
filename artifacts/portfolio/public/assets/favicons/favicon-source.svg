<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e40"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>

  <!-- Letter U -->
  <text x="256" y="320" font-family="Georgia, serif" font-size="280" font-weight="700" text-anchor="middle" fill="url(#textGrad)" letter-spacing="-8">U</text>

  <!-- Accent dot -->
  <circle cx="256" cy="420" r="14" fill="#6366f1" opacity="0.9"/>
</svg>
